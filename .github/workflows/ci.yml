name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test tests/*.test.ts

      - name: Bench smoke (quick matrix)
        run: bun run benchmarks/index.ts --quick --json > bench/current.json

      - name: Bench regression gate (vs bench/baseline-ci.json if present)
        run: bun run scripts/bench-check.ts --baseline bench/baseline-ci.json --current bench/current.json --threshold 0.05

      - name: Build
        run: bun run build
